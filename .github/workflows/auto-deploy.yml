# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Auto Deploy on Main

# On every push to main, compute which apps are turbo-affected by the commit
# range and dispatch the per-app production deploy (deploy.yml) for each.
# Mirrors the eslint repo's CD. Changes to packages/ui/** cascade into the
# apps via the workspace graph, so we use turbo's `...[<sha>]` selector
# rather than path filters.

on:
  push:
    branches: [main]

concurrency:
  group: auto-deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: write # dispatch deploy.yml

jobs:
  affected:
    name: Compute turbo-affected apps
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      landing: ${{ steps.compute.outputs.landing }}
      registry: ${{ steps.compute.outputs.registry }}
      storybook: ${{ steps.compute.outputs.storybook }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: npm ci --no-audit --no-fund
      - id: compute
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          if [[ -z "$BEFORE_SHA" || "$BEFORE_SHA" == "0000000000000000000000000000000000000000" ]] \
             || ! git cat-file -e "$BEFORE_SHA^{commit}" 2>/dev/null; then
            echo "::notice::No usable diff base — deploying all three apps."
            { echo "landing=true"; echo "registry=true"; echo "storybook=true"; } >> "$GITHUB_OUTPUT"; exit 0
          fi
          AFFECTED=$(npx --no turbo run build --filter="...[$BEFORE_SHA]" --dry-run=json | jq -r '.tasks[]?.package' | sort -u || true)
          echo "Affected:"; echo "$AFFECTED" | sed 's/^/  /'
          has() { echo "$AFFECTED" | grep -qx "$1"; }
          {
            has "@interlace/landing" && echo "landing=true" || echo "landing=false"
            has "registry"           && echo "registry=true" || echo "registry=false"
            has "@interlace/storybook" && echo "storybook=true" || echo "storybook=false"
          } >> "$GITHUB_OUTPUT"

  dispatch:
    needs: affected
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - name: Dispatch per-app production deploys
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          for app in landing registry storybook; do
            case "$app" in
              landing) flag="${{ needs.affected.outputs.landing }}";;
              registry) flag="${{ needs.affected.outputs.registry }}";;
              storybook) flag="${{ needs.affected.outputs.storybook }}";;
            esac
            if [ "$flag" = "true" ]; then
              echo "Deploying $app"
              gh workflow run deploy.yml -f app="$app" -f target=production
            else
              echo "Skipping $app (not affected)"
            fi
          done
