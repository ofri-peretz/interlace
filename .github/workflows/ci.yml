name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  install:
    name: install
    runs-on: ubuntu-latest
    outputs:
      cache-hit: ${{ steps.cache.outputs.cache-hit }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci --no-audit --no-fund

  typecheck:
    name: typecheck
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run typecheck

  test:
    name: test (lock + unit)
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm test

  build:
    name: build (turbo)
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run build

  # ─── Gate 5: registry drift ────────────────────────────────────────────
  # `apps/registry/scripts/build-registry.mjs --check` rebuilds every item
  # in memory and diffs against the committed `public/r/*.json`. Catches the
  # case where someone edits a primitive's source but forgets to re-run the
  # registry generator before pushing.
  registry-drift:
    name: registry (drift)
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Check registry items match sources
        run: node apps/registry/scripts/build-registry.mjs --check

  # ─── Gate 6: storybook static build ────────────────────────────────────
  # Catches story-side API drift (a story importing a name the primitive no
  # longer exports). Caught this 3× during PR #1 — wiring it as a gate
  # prevents the same surprise next time.
  storybook-build:
    name: storybook (build)
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --no-audit --no-fund
      # Use turbo so the dep graph fires `@interlace/ui#build` first —
      # storybook stories import from compiled dist (per packages/ui
      # `exports` map pointing at ./dist), so the package must be built
      # before storybook resolves any `@interlace/ui/<x>` import.
      - run: npx turbo run build-storybook --filter=@interlace/storybook
      - name: Upload static build
        uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: apps/storybook/storybook-static
          retention-days: 7
          if-no-files-found: error

  # ─── Gate 7: storybook a11y / axe (advisory, soft-launch) ─────────────
  # Renders every story headlessly and runs axe-core against it (wcag2aa,
  # wcag22aa, best-practice, ACT). Test-runner is already configured at
  # apps/storybook/test-runner.ts — this just fires it.
  #
  # SOFT-LAUNCH: `continue-on-error: true` lets the job report findings
  # without blocking the merge. First run surfaced ~37 real violations
  # across 14 stories (color-contrast on muted text, missing aria-label
  # on icon-only buttons in stories, Base UI ARIA props in
  # Slider/Progress/NumberField). Fixing those is tracked separately;
  # once green, drop `continue-on-error` to make this a hard gate.
  storybook-a11y:
    name: storybook (a11y · advisory)
    needs: storybook-build
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Install Playwright browsers (test-runner uses chromium)
        run: npx playwright install --with-deps chromium
      - name: Restore storybook static build
        uses: actions/download-artifact@v4
        with:
          name: storybook-static
          path: apps/storybook/storybook-static
      - name: Run axe against every story
        run: npm run test-storybook:ci --workspace=@interlace/storybook
